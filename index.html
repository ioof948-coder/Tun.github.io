<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการบ้านและการทำงาน (To-Do List SPA)</title>
    <style>
        /* ==========================================================================
           CSS ส่วนที่ 1: ตัวแปรสีสำหรับ Light Mode และ Dark Mode
           ========================================================================== */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --border-color: #dddddd;
            --shadow-color: rgba(0, 0, 0, 0.1);
            
            /* สีเฉพาะของสถานะและความสำคัญ */
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --success-color: #2ecc71;
            --info-color: #3498db;
        }

        /* เมื่อเปิดใช้งาน Class "dark-mode" จะเปลี่ยนค่าตัวแปรสีทั้งหมด */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --border-color: #444444;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        /* ==========================================================================
           CSS ส่วนที่ 2: จัดการ Layout และความสวยงาม (Responsive Design)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif; /* ใช้ฟอนต์ที่อ่านง่ายสำหรับภาษาไทย */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; /* ทำให้เวลาเปลี่ยนโหมดมืดจะละมุนขึ้น */
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header และปุ่มเปลี่ยนโหมด */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        .btn-theme {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* การจัดแต่ง Card (กล่องข้อมูล) */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
        }

        h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        /* ส่วนของ Dashboard (ใช้ Grid Layout เพื่อรองรับมือถือ) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* จัดแต่งฟอร์มกรอกข้อมูล และ ส่วนค้นหา */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--card-bg);
            color: var(--text-color);
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* รายการ Task (การบ้าน) */
        .task-item {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-left: 6px solid var(--border-color);
            margin-bottom: 10px;
            background-color: var(--card-bg);
            border-radius: 0 8px 8px 0;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        /* เปลี่ยนสีขอบตามระดับความสำคัญ */
        .priority-high { border-left-color: var(--danger-color); }
        .priority-medium { border-left-color: var(--warning-color); }
