<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pastel To-Do List (Fixed Fonts)</title>
    <style>
        /* ==========================================================================
           1. ส่วนของ CSS (ปรับฟอนต์มาตรฐานและเน้นสีตัวหนังสือเข้มชัดเจน)
           ========================================================================== */
        
        :root {
            /* สีพื้นหลังหลักแบบสว่าง */
            --bg-color: #f1f5f9;          
            --text-color: #0f172a;        /* ปรับสีตัวหนังสือเป็นเทาเข้มเกือบดำเพื่อให้เห็นชัดสุดๆ */
            --text-light: #475569;
            
            /* กล่อง Dashboard: สีส้มพาสเทล */
            --dash-bg: #ffedd5;            
            --dash-border: #ea580c;
            
            /* กล่องฟอร์มเพิ่มงาน: สีเขียวพาสเทล */
            --form-bg: #dcfce7;            
            --form-border: #16a34a;
            
            /* กล่องระบบกรองข้อมูล: สีม่วงพาสเทล */
            --filter-bg: #f3e8ff;          
            --filter-border: #9333ea;
            
            /* การ์ดรายการงานทั่วไป */
            --list-header-color: #0284c7;  
            --card-bg-default: #ffffff;    
            --card-border-default: #cbd5e1;

            /* สีปุ่ม */
            --btn-primary: #2563eb;
            --btn-secondary: #475569;
            --btn-danger: #dc2626;

            /* ป้ายสถานะ */
            --success-bg: #bbf7d0;
            --success-text: #14532d;
            --warning-bg: #fef08a;
            --warning-text: #713f12;
            
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
        }

        /* ธีมสลับโหมด (เน้นใช้สีพื้นหลังเทาเข้ม ไม่ดำสนิท และตัวหนังสือขาวชัดเจน) */
        [data-theme="dark"] {
            --bg-color: #1e293b;
            --text-color: #ffffff;
            --text-light: #cbd5e1;
            
            --dash-bg: #334155;
            --dash-border: #94a3b8;
            --form-bg: #334155;
            --form-border: #38bdf8;
            --filter-bg: #334155;
            --filter-border: #c084fc;
            
            --list-header-color: #38bdf8;
            --card-bg-default: #0f172a;
            --card-border-default: #475569;

            --btn-primary: #3b82f6;
            --btn-secondary: #64748b;
            --btn-danger: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* แก้ไขตรงนี้: ใช้ฟอนต์มาตรฐานที่ทุกเครื่องมีชัวร์ๆ ตัวหนังสือไม่หายแน่นอน */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.2s, color 0.2s;
            padding: 30px 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--text-light);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
        }

        /* ใช้สีพาสเทลแยกส่วนการทำงาน */
        .dashboard-section {
            background-color: var(--dash-bg);
            border-color: var(--dash-border);
        }
        .dashboard-section h2 { color: var(--dash-border); }

        .form-section {
            background-color: var(--form-bg);
            border-color: var(--form-border);
        }
        .form-section h2 { color: var(--form-border); }

        .filter-section {
            background-color: var(--filter-bg);
            border-color: var(--filter-border);
        }
        .filter-section h2 { color: var(--filter-border); }

        h2 {
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* ตกแต่งปุ่มกด */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary { background-color: var(--btn-primary); }
        .btn-secondary { background-color: var(--btn-secondary); }
        .btn-danger { background-color: var(--btn-danger); }
