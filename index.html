<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Color Cyber To-Do List</title>
    <style>
        /* ==========================================================================
           1. ส่วนของ CSS (ปรับสีสันให้แต่ละส่วนแตกต่างกันอย่างชัดเจน)
           ========================================================================== */
        
        /* ธีมเริ่มต้น: Cyber-Neon Multi-Color */
        :root {
            --bg-color: #0b0f19;          /* พื้นหลังสีดำอวกาศ */
            --text-color: #ffffff;        /* ตัวหนังสือหลักสีขาวเพื่อให้เห็นชัด */
            --text-light: #94a3b8;
            
            /* แยกสีขอบและพื้นหลังของแต่ละส่วน (Section) */
            --header-color: #f43f5e;       /* สีชมพูนีออน สำหรับส่วนหัว */
            --dash-border: #f59e0b;        /* สีส้มทอง สำหรับ Dashboard */
            --dash-bg: #1e1b4b;            /* พื้นหลัง Dashboard สีน้ำเงินเข้ม */
            --form-border: #10b981;        /* สีเขียวนีออน สำหรับฟอร์มเพิ่มงาน */
            --form-bg: #064e3b;            /* พื้นหลังฟอร์ม สีเขียวเข้ม */
            --filter-border: #a855f7;      /* สีม่วงนีออน สำหรับระบบกรองข้อมูล */
            --filter-bg: #3b0764;          /* พื้นหลังระบบกรอง สีม่วงเข้ม */
            --list-border: #06b6d4;        /* สีฟ้านีออน สำหรับรายการงาน */
            --card-bg-default: #111827;    /* พื้นหลังการ์ดงานทั่วไป */

            /* ระบบปุ่ม */
            --btn-primary: #10b981;
            --btn-secondary: #6366f1;
            --btn-danger: #ef4444;

            /* สถานะ */
            --success-bg: #022c22;
            --success-text: #34d399;
            --warning-bg: #451a03;
            --warning-text: #facc15;
            
            --shadow: 0px 0px 12px rgba(255, 255, 255, 0.1);
        }

        /* ธีมสลับโหมด: Retro Monochrome (ขาว-ดำมินิมอลตัดด้วยแดง) */
        [data-theme="dark"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --text-light: #4b5563;
            
            --header-color: #000000;
            --dash-border: #000000;
            --dash-bg: #f3f4f6;
            --form-border: #000000;
            --form-bg: #f3f4f6;
            --filter-border: #000000;
            --filter-bg: #f3f4f6;
            --list-border: #000000;
            --card-bg-default: #ffffff;

            --btn-primary: #000000;
            --btn-secondary: #4b5563;
            --btn-danger: #dc2626;

            --success-bg: #e2e8f0;
            --success-text: #000000;
            --warning-bg: #fef3c7;
            --warning-text: #d97706;
            --shadow: 4px 4px 0px #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, 'Prompt';
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            padding: 20px 10px;
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.1) 50%, rgba(255, 255, 255, 0.01) 50%);
            background-size: 100% 4px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 4px double var(--header-color);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--header-color);
            text-shadow: 0 0 8px var(--header-color);
        }
